<script>
(function(){
  try{var t=localStorage.getItem('singularity-theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}
})();
window.toggleDarkMode=function(){
  var cur=document.documentElement.getAttribute('data-theme')||'light';
  var next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  try{localStorage.setItem('singularity-theme',next);}catch(e){}
  var btn=document.getElementById('dark-toggle');
  if(btn)btn.textContent=next==='dark'?'☀️':'🌙';
};
window.applyThemeIcon=function(){
  var btn=document.getElementById('dark-toggle');
  if(btn)btn.textContent=(document.documentElement.getAttribute('data-theme')==='dark')?'☀️':'🌙';
};
</script>

<script>
/* ── DARK MODE LOGIC ── */
(function(){
  const saved = localStorage.getItem('singularity-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  // Update toggle button icon when it appears
  window.applyThemeIcon = function(){
    const btn = document.getElementById('dark-toggle');
    if(btn) btn.textContent = (localStorage.getItem('singularity-theme')==='dark') ? '☀️' : '🌙';
  };
  window.toggleDarkMode = function(){
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('singularity-theme', next);
    window.applyThemeIcon();
  };
})();
</script>

<script>

async function initPage(){
  const p = await initApp();
  if(!p) return;
  currentProfile=p;
  currentProfile=p;

  // Set back button destination based on role
  document.getElementById('back-btn').onclick=()=>{
    location.href=p.role==='landlord'?'singularity-rentals.html':'singularity-dashboard.html';
  };

  await loadNotifications();

  // Real-time subscription for new notifications
  sb.channel('notifications')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`user_id=eq.${user.id}`},
      payload=>{
        allNotifs.unshift(payload.new);
        renderNotifications();
        updateUnreadCount();
      })
    .subscribe();
}

async function loadNotifications(){
  const {data,error}=await sb.from('notifications')
    .select('*')
    .eq('user_id',currentUser.id)
    .order('created_at',{ascending:false})
    .limit(50);

  if(error){
    // Table might not exist yet — show empty state
    renderEmpty();
    document.getElementById('page-sub').textContent='No notifications yet';
    return;
  }

  allNotifs=data||[];

  // If no notifications, create some welcome ones
  if(!allNotifs.length){
    await createWelcomeNotification();
    const {data:fresh}=await sb.from('notifications').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});
    allNotifs=fresh||[];
  }

  updateUnreadCount();
  renderNotifications();
}

async function createWelcomeNotification(){
  try{
    await sb.from('notifications').insert({
      user_id:currentUser.id,
      title:'Welcome to Singularity Rentals! 🎉',
      message:`Your account has been created successfully. ${currentProfile?.role==='landlord'?'Start by posting your first listing to attract tenants.':'Browse available listings and find your perfect home.'}`,
      type:'success',
      link:currentProfile?.role==='landlord'?'singularity-rentals.html':'singularity-tenant.html',
    });
  }catch(e){console.warn('Could not create welcome notification:',e);}
}

function updateUnreadCount(){
  const unread=allNotifs.filter(n=>!n.is_read).length;
  const el=document.getElementById('unread-count');
  el.textContent=unread>0?`${unread} unread`:'All read';
  el.style.color=unread>0?'var(--accent2)':'var(--muted)';
  // Update any bell badges on parent pages
  try{
    localStorage.setItem('singularity_unread_notifs',unread);
  }catch(e){}
}

function setFilter(el,filter){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentFilter=filter;
  renderNotifications();
}

function renderNotifications(){
  const list=document.getElementById('notif-list');
  let filtered=allNotifs;
  if(currentFilter==='unread')filtered=allNotifs.filter(n=>!n.is_read);
  else if(currentFilter!=='all')filtered=allNotifs.filter(n=>n.type===currentFilter);

  if(!filtered.length){
    renderEmpty(currentFilter);
    return;
  }

  // Group by date
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  const groups={Today:[],Yesterday:[],Earlier:[]};

  filtered.forEach(n=>{
    const d=new Date(n.created_at).toDateString();
    if(d===today)groups.Today.push(n);
    else if(d===yesterday)groups.Yesterday.push(n);
    else groups.Earlier.push(n);
  });

  const typeIcons={payment:'💳',request:'📋',maintenance:'🔧',success:'✅',warning:'⚠️',info:'ℹ️'};
  const typeColors={payment:'icon-payment',request:'icon-request',maintenance:'icon-maintenance',success:'icon-success',warning:'icon-warning',info:'icon-info'};

  let html='';
  Object.entries(groups).forEach(([group,items])=>{
    if(!items.length)return;
    html+=`<div class="group-header">${group}</div>`;
    items.forEach(n=>{
      const timeAgo=getTimeAgo(n.created_at);
      html+=`
        <div class="notif-item ${n.is_read?'':'unread'}" id="notif-${n.id}">
          <div class="notif-icon ${typeColors[n.type]||'icon-info'}">${typeIcons[n.type]||'🔔'}</div>
          <div class="notif-body">
            <div class="notif-title">${n.title}</div>
            <div class="notif-message">${n.message}</div>
            ${n.link?`<a class="notif-link" href="${n.link}">View details →</a>`:''}
            <div class="notif-time">${timeAgo}</div>
          </div>
          <div class="notif-right">
            ${!n.is_read?`<div class="unread-dot"></div>`:''}
            <button class="read-btn" title="${n.is_read?'Already read':'Mark as read'}" onclick="markRead('${n.id}',${n.is_read})">
              ${n.is_read?'✓':'○'}
            </button>
          </div>
        </div>`;
    });
  });

  list.innerHTML=html;
  document.getElementById('page-sub').textContent=`${filtered.length} notification${filtered.length!==1?'s':''}`;
}

function renderEmpty(filter='all'){
  const msgs={
    all:{icon:'🔔',title:'No notifications yet',sub:'You\'ll be notified here about payments, rental requests, maintenance updates and more.'},
    unread:{icon:'✓',title:'All caught up!',sub:'You have no unread notifications.'},
    payment:{icon:'💳',title:'No payment notifications',sub:'Payment confirmations and reminders will appear here.'},
    request:{icon:'📋',title:'No request notifications',sub:'Rental request updates will appear here.'},
    maintenance:{icon:'🔧',title:'No maintenance notifications',sub:'Maintenance request updates will appear here.'},
  };
  const m=msgs[filter]||msgs.all;
  document.getElementById('notif-list').innerHTML=`
    <div class="empty">
      <div class="empty-icon">${m.icon}</div>
      <div class="empty-title">${m.title}</div>
      <div class="empty-sub">${m.sub}</div>
    </div>`;
}

async function markRead(id,alreadyRead){
  if(alreadyRead)return;
  await sb.from('notifications').update({is_read:true}).eq('id',id);
  const n=allNotifs.find(x=>x.id===id);
  if(n)n.is_read=true;
  renderNotifications();
  updateUnreadCount();
  showToast('Marked as read','ok');
}

async function markAllRead(){
  const unreadIds=allNotifs.filter(n=>!n.is_read).map(n=>n.id);
  if(!unreadIds.length){showToast('All already read','ok');return;}
  await sb.from('notifications').update({is_read:true}).in('id',unreadIds);
  allNotifs.forEach(n=>n.is_read=true);
  renderNotifications();
  updateUnreadCount();
  showToast(`${unreadIds.length} notifications marked as read`,'ok');
}

function getTimeAgo(dateStr){
  const diff=Date.now()-new Date(dateStr).getTime();
  const mins=Math.floor(diff/60000);
  const hours=Math.floor(diff/3600000);
  const days=Math.floor(diff/86400000);
  if(mins<1)return'Just now';
  if(mins<60)return`${mins}m ago`;
  if(hours<24)return`${hours}h ago`;
  if(days<7)return`${days}d ago`;
  return new Date(dateStr).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent='✓ '+msg;
  t.className='toast show '+(type==='ok'?'ok':'err');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

/**
 * SINGULARITY RENTALS — Shared Sidebar Builder
 * Call: buildSharedSidebar(profile, activePage)
 */
function buildSharedSidebar(profile, activePage) {
  const sidebar = document.getElementById('sidebar');
  if (!sidebar) return;

  const fn = profile.full_name || 'User';
  const initials = fn.split(' ').filter(Boolean).map(n => n[0]).join('').substring(0, 2).toUpperCase();
  const isLandlord = profile.role === 'landlord';
  const avatarHTML = profile.profile_photo
    ? `<img src="${profile.profile_photo}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;">`
    : initials;
  const avatarBg = isLandlord
    ? 'linear-gradient(135deg,#f59e0b,#ef4444)'
    : 'linear-gradient(135deg,#7c3aed,#9333ea)';

  const landlordNav = [
    { sec: 'Manage' },
    { icon: '🏠', label: 'My Listings',     url: 'singularity-rentals.html',     key: 'listings' },
    { icon: '📋', label: 'Rental Requests', url: 'singularity-requests.html',    key: 'requests' },
    { icon: '🗺',  label: 'Map View',        url: 'singularity-map.html',         key: 'map' },
    { icon: '💳', label: 'Payments',        url: 'singularity-payment.html',     key: 'payments' },
    { icon: '🔧', label: 'Maintenance',     url: 'singularity-maintenance.html', key: 'maintenance' },
    { icon: '⭐', label: 'Ratings',         url: 'singularity-ratings.html',     key: 'ratings' },
    { sec: 'Reports' },
    { icon: '🧾', label: 'Receipts',        url: 'singularity-receipt.html',     key: 'receipts' },
    { icon: '📊', label: 'Analytics',       url: 'singularity-analytics.html',   key: 'analytics' },
    { sec: 'Account' },
    { icon: '🔐', label: 'Verification',    url: 'singularity-verify.html',      key: 'verify',
      badge: profile.is_verified ? 'verified' : 'unverified',
      badgeText: profile.is_verified ? '✓' : '!' },
    { icon: '🔔', label: 'Notifications',   url: 'singularity-notifications.html', key: 'notifications', bell: true },
  ];

  const tenantNav = [
    { sec: 'My Home' },
    { icon: '🏠', label: 'Dashboard',       url: 'singularity-dashboard.html',   key: 'dashboard' },
    { icon: '🔍', label: 'Browse',          url: 'singularity-tenant.html',      key: 'browse' },
    { icon: '🗺',  label: 'Map View',        url: 'singularity-map.html',         key: 'map' },
    { sec: 'My Rental' },
    { icon: '💳', label: 'Pay Rent',        url: 'singularity-payment.html',     key: 'pay' },
    { icon: '🧾', label: 'Receipts',        url: 'singularity-receipt.html',     key: 'receipts' },
    { icon: '🔧', label: 'Maintenance',     url: 'singularity-maintenance.html', key: 'maintenance' },
    { sec: 'Account' },
    { icon: '🔐', label: 'Verification',    url: 'singularity-verify.html',      key: 'verify',
      badge: profile.is_verified ? 'verified' : 'unverified',
      badgeText: profile.is_verified ? '✓' : '!' },
    { icon: '🔔', label: 'Notifications',   url: 'singularity-notifications.html', key: 'notifications', bell: true },
  ];

  const nav = isLandlord ? landlordNav : tenantNav;
  let navHTML = '';
  nav.forEach(item => {
    if (item.sec) { navHTML += `<div class="sb-sec">${item.sec}</div>`; return; }
    const isActive = item.key === activePage;
    navHTML += `
      <div class="sb-link${isActive ? ' active' : ''}" onclick="location.href='${item.url}'">
        <span class="sb-link-icon">${item.icon}</span>
        <span>${item.label}</span>
        ${item.bell ? `<span class="notif-badge" id="notif-badge" style="display:none">0</span>` : ''}
        ${item.badge && !item.bell ? `<span class="sb-badge ${item.badge}">${item.badgeText}</span>` : ''}
      </div>`;
  });

  sidebar.innerHTML = `
    <div class="sb-brand" onclick="location.href='${isLandlord ? 'singularity-rentals.html' : 'singularity-dashboard.html'}'">
      <div class="sb-logo">Singularity</div>
      <div class="sb-sub">Rentals</div>
    </div>
    <div class="sb-user">
      <div class="sb-avatar" id="sb-avatar" style="background:${avatarBg}">${avatarHTML}</div>
      <div class="sb-user-info">
        <div class="sb-uname" id="sb-uname">${fn}</div>
        <div class="sb-urole" id="sb-urole">${isLandlord ? 'Landlord' : 'Tenant'}</div>
      </div>
    </div>
    <nav class="sb-nav">${navHTML}</nav>
    <div class="sb-logout" onclick="doLogout()"><span>🚪</span><span>Log Out</span></div>`;

  const toggle = document.createElement('div');
  toggle.className = 'sb-toggle'; toggle.id = 'sb-toggle'; toggle.title = 'Toggle sidebar';
  const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
  toggle.textContent = isCollapsed ? '›' : '‹';
  if (isCollapsed) sidebar.classList.add('collapsed');
  toggle.onclick = () => {
    const c = sidebar.classList.toggle('collapsed');
    toggle.textContent = c ? '›' : '‹';
    localStorage.setItem('sidebar-collapsed', c);
  };
  sidebar.appendChild(toggle);
}
