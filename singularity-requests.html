<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<script>
(function(){
  try{var t=localStorage.getItem('singularity-theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}
})();
window.toggleDarkMode=function(){
  var cur=document.documentElement.getAttribute('data-theme')||'light';
  var next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  try{localStorage.setItem('singularity-theme',next);}catch(e){}
  var btn=document.getElementById('dark-toggle');
  if(btn)btn.textContent=next==='dark'?'☀️':'🌙';
};
window.applyThemeIcon=function(){
  var btn=document.getElementById('dark-toggle');
  if(btn)btn.textContent=(document.documentElement.getAttribute('data-theme')==='dark')?'☀️':'🌙';
};
</script>
<style>

<script>
/* ── DARK MODE LOGIC ── */
(function(){
  const saved = localStorage.getItem('singularity-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  // Update toggle button icon when it appears
  window.applyThemeIcon = function(){
    const btn = document.getElementById('dark-toggle');
    if(btn) btn.textContent = (localStorage.getItem('singularity-theme')==='dark') ? '☀️' : '🌙';
  };
  window.toggleDarkMode = function(){
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('singularity-theme', next);
    window.applyThemeIcon();
  };
})();
</script>

<style>

</style>

async function initPage(){
  const p = await initApp();
  if(!p) return;
  currentProfile=p;
  currentProfile=p;
  buildSidebar(p);
  loadNotifBadge();
  await loadRequests();
}

async function loadRequests(){
  const {data,error}=await sb.from('rental_requests')
    .select(`
      *,
      listings(id,title,address,price,type,beds,baths,emoji,photos),
      profiles:tenant_id(full_name,phone,profile_photo,is_verified)
    `)
    .eq('landlord_id',currentUser.id)
    .order('created_at',{ascending:false});

  if(error){showToast('Error loading requests: '+error.message,'err');return;}
  allRequests=data||[];

  const pending=allRequests.filter(r=>r.status==='pending').length;
  document.getElementById('page-sub').textContent=
    pending>0?`${pending} request${pending>1?'s':''} awaiting your approval`:'Review and approve tenant room requests';

  renderRequests();
}

function setFilter(el,filter){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentFilter=filter;
  renderRequests();
}

function renderRequests(){
  const grid=document.getElementById('requests-grid');
  const filtered=currentFilter==='all'?allRequests:allRequests.filter(r=>r.status===currentFilter);

  if(!filtered.length){
    const msgs={
      all:'No rental requests yet. When tenants select your listings, their requests will appear here.',
      pending:'No pending requests. All requests have been reviewed.',
      approved:'No approved requests yet.',
      rejected:'No rejected requests.'

async function updateRequest(id,status){
  const action=status==='approved'?'approve':'reject';
  if(!confirm(`${action.charAt(0).toUpperCase()+action.slice(1)} this request?`))return;

  const card=document.getElementById('req-'+id);
  if(card)card.style.opacity='0.5';

  const {error}=await sb.from('rental_requests').update({status}).eq('id',id);
  if(error){showToast('Error: '+error.message,'err');if(card)card.style.opacity='1';return;}

  const req=allRequests.find(r=>r.id===id);

  // If approved, update listing status to occupied and notify tenant
  if(status==='approved'){
    if(req?.listings?.id){
      await sb.from('listings').update({status:'occupied'}).eq('id',req.listings.id);
    }
    // Reject all other pending requests for same listing
    const others=allRequests.filter(r=>r.id!==id&&r.listings?.id===req?.listings?.id&&r.status==='pending');
    for(const o of others){
      await sb.from('rental_requests').update({status:'rejected'}).eq('id',o.id);
      // Notify rejected tenants
      await sb.from('notifications').insert({
        user_id:o.tenant_id,
        title:'❌ Rental Request Not Approved',
        message:`Your request for "${req?.listings?.title||'this property'}" was not approved this time. Browse other available listings.`,
        type:'warning',
        link:'singularity-tenant.html',
      }).catch(()=>{});
    }
    // Notify approved tenant
    await sb.from('notifications').insert({
      user_id:req.tenant_id,
      title:'✅ Rental Request Approved!',
      message:`${currentProfile?.full_name||'Your landlord'} has approved your request for "${req?.listings?.title||'the property'}". You can now proceed to make your first payment.`,
      type:'success',
      link:'singularity-payment.html',
    }).catch(()=>{});
  } else if(status==='rejected'){
    // Notify rejected tenant
    await sb.from('notifications').insert({
      user_id:req.tenant_id,
      title:'❌ Rental Request Not Approved',
      message:`Your request for "${req?.listings?.title||'this property'}" was not approved. Browse other available listings.`,
      type:'warning',
      link:'singularity-tenant.html',
    }).catch(()=>{});
  }

  showToast(status==='approved'?'✅ Request approved! Tenant notified.':'Request rejected.', status==='approved'?'ok':'err');
  await loadRequests();
}

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=(type==='ok'?'✓ ':'⚠ ')+msg;

}

async function loadNotifBadge(){
  if(!window.sb||!currentUser)return;
  try{
    const {count}=await window.sb.from('notifications')
      .select('*',{count:'exact',head:true})
      .eq('user_id',currentUser.id)
      .eq('is_read',false);
    const badge=document.getElementById('notif-badge');
    if(badge){
      if(count>0){badge.textContent=count>9?'9+':count;badge.style.display='flex';}

    }
  }catch(e){}
}

/* Supabase load with retry - fixes blank page on Vercel */
function loadSupabaseWithRetry(callback, retries=3){
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
  s.onload = callback;
  s.onerror = () => {
    if(retries > 0){
      console.warn('Supabase CDN failed, retrying...');
      setTimeout(()=>loadSupabaseWithRetry(callback, retries-1), 1500);
    } else {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;flex-direction:column;gap:16px;"><div style="font-size:48px">⚠️</div><div style="font-size:18px;color:#64748b">Could not connect. Please check your internet and refresh.</div><button onclick="location.reload()" style="padding:10px 24px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;">Retry</button></div>';
    }
  };
  document.head.appendChild(s);
}
